<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Nami — Espace patient">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFAF8"/>
      <stop offset="1" stop-color="#F5F3EF"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5B4EC4"/>
      <stop offset="1" stop-color="#2BA89C"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5B4EC4" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#5B4EC4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <circle cx="980" cy="180" r="280" fill="url(#orb)"/>
  <circle cx="220" cy="500" r="220" fill="url(#orb)" opacity="0.6"/>

  <!-- Brand mark (top-left) -->
  <g transform="translate(80, 80)">
    <circle cx="22" cy="22" r="22" fill="url(#brand)"/>
    <text x="62" y="32" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="28" font-weight="800" fill="#1A1A2E" letter-spacing="-0.02em">Nami</text>
  </g>

  <!-- Eyebrow -->
  <text x="80" y="270" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="18" font-weight="800" fill="#5B4EC4" letter-spacing="0.18em">ESPACE PATIENT</text>

  <!-- Headline -->
  <text x="80" y="360" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="74" font-weight="800" fill="#1A1A2E" letter-spacing="-0.03em">Votre parcours de soins,</text>
  <text x="80" y="440" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="74" font-weight="800" fill="url(#brand)" letter-spacing="-0.03em">en un seul endroit.</text>

  <!-- Sub -->
  <text x="80" y="510" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="26" font-weight="500" fill="#374151">Rendez-vous · Messages · Documents · Équipe soignante</text>

  <!-- Footer URL -->
  <text x="80" y="585" font-family="'Plus Jakarta Sans', system-ui, sans-serif" font-size="20" font-weight="600" fill="#6B7280">namipourlavie.com</text>
</svg>
