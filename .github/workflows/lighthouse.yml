name: Lighthouse CI (prod baseline)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Commit ref / tag — informational only, audit always hits prod"
        required: false
        default: "main"
  schedule:
    # Hebdo — lundi 06:00 UTC. Permet de surveiller la dérive perf pre-launch C10.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse CI (public URLs only)
        run: npx lhci autorun
        continue-on-error: true

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 30
